<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8" />
  <title>Строка таблицы → текст предложения</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="style-bp.css">
</head>

<body>

  <div class="container">
    <section class="card">
      <header>
        <h2>Входные данные</h2>
      </header>
      <div class="content">
        <label class="input-label">Вставьте сюда строку из таблицы Excel</label>
        <textarea id="row" class="input-textarea"></textarea>

        <div class="addition">
          <div class="addition-block addition-block-x">
            <h3 class="block-title">расчет ставки</h3>
            <div class="checkbox-group">
              <label class="checkbox-item">
                <input type="checkbox" id="check-dimensions">
                <span class="checkbox-text">Нет точных размеров</span>
              </label>
              <label class="checkbox-item">
                <input type="checkbox" id="check-stackable">
                <span class="checkbox-text">Считал как штаб ✅</span>
              </label>
              <label class="checkbox-item">
                <input type="checkbox" id="check-non-stackable">
                <span class="checkbox-text">Считал как не штаб ❌</span>
              </label>
              <label class="checkbox-item">
                <input type="checkbox" id="check-stackable-alt">
                <span class="checkbox-text">Штаб / не штаб (2 цены)</span>
              </label>
            </div>
          </div>

          <div class="addition-block addition-block-x">
            <h3 class="block-title">опции автомобиля</h3>
            <div class="checkbox-group">
              <label class="checkbox-item">
                <input type="checkbox" id="check-temperature">
                <span class="checkbox-text">Температурный режим 🌡️</span>
              </label>
              <label class="checkbox-item">
                <input type="checkbox" id="check-navigation">
                <span class="checkbox-text">Навигационная пломба 🧭</span>
              </label>
              <label class="checkbox-item">
                <input type="checkbox" id="check-adr">
                <span class="checkbox-text">ADR авто ☢️</span>
              </label>
              <label class="checkbox-item">
                <input type="checkbox" id="check-adr9">
                <span class="checkbox-text">ADR авто ☢️ (2 цены)</span>
              </label>
              <label class="checkbox-item">
                <input type="checkbox" id="check-delivery">
                <span class="checkbox-text">Довоз нашей</span>
              </label>
              <label class="checkbox-item">
                <input type="checkbox" id="check-delivery-another">
                <span class="checkbox-text">Довоз отдельной</span>
              </label>
              <label class="checkbox-item">
                <input type="checkbox" id="check-MZL">
                <span class="checkbox-text">Груз в Маньчжурии</span>
              </label>
              <label class="checkbox-item">
                <input type="checkbox" id="check-brand">
                <span class="checkbox-text">Бренд / сокрытие</span>
              </label>
            </div>
          </div>
        </div>

        <div class="btns">
          <button class="transform-button" onclick="transform()">Преобразовать</button>
          <button class="reset-button" onclick="resetAll()">Сбросить</button>
          <div class="relevance-block">
            <span>Действие ставки: </span>
            <input class="relevance-radio" type="radio" name="relevance" id="one-day-relevance">
            <label class="relevance-label" for="one-day-relevance">1 день</label>
            <input class="relevance-radio" type="radio" name="relevance" id="three-day-relevance" checked>
            <label class="relevance-label" for="three-day-relevance">3 дня</label>
            <input class="relevance-radio" type="radio" name="relevance" id="five-day-relevance">
            <label class="relevance-label" for="five-day-relevance">5 дней</label>
            <input class="relevance-radio" type="radio" name="relevance" id="seven-day-relevance">
            <label class="relevance-label" for="seven-day-relevance">7 дней</label>
            <label class="label-epi"><input type="checkbox" id="check-EPI">Расходы за ЭПИ</label>
          </div>
        </div>
      </div>
    </section>

    <section class="card">
      <header>
        <h2>Результат</h2>
      </header>
      <div class="content">
        <div id="out" class="output-preview">Здесь появится текст.</div>
        <div class="btns"><button class="copy-button" onclick="copyOut()">Копировать</button></div>
      </div>
    </section>
  </div>

  <div id="toast"></div>

  <script>
    function detectSep(s) {
      const counts = {
        '\t': (s.match(/\t/g) || []).length,
        ';': (s.match(/;/g) || []).length,
        ',': (s.match(/,/g) || []).length,
        '|': (s.match(/\|/g) || []).length,
      };
      let best = '\t', max = counts['\t'];
      for (const k of [';', ',', '|']) {
        if (counts[k] > max) { max = counts[k]; best = k; }
      }
      return max > 0 ? best : null;
    }

    function parseRow(raw, sepMode, doTrim) {
      let sep = sepMode === 'auto' ? detectSep(raw) : sepMode;
      if (!sep) sep = '\t';
      let parts = raw.split(sep);
      if (doTrim === 'yes') parts = parts.map(p => p.trim());
      return parts;
    }

    // --- обработчики для конкретных ячеек ---
    function handleCode(cell) { return cell }
    function handleCompany(cell) {
      const matches = cell.match(/\((.*?)\)/g);

      if (matches) {
        // const extractedText = matches.map(m => m.slice(1, -1)); // Убираем скобки
        // return extractedText;
        return matches.map(m => m.slice(1, -1)); // Убираем скобки
      }
    }
    function handleDeliver(cell) { return cell.split('(')[0]; }
    function handlePrice(cell) { return cell }
    function handleFrom(cell) { return cell }
    function handleSvh(cell) { return cell }

    function handleTransit(cell) {
      cell = cell.trim();
      const numbers = cell.match(/\d+/g);
      if (!numbers) return cell;

      const number = parseInt(numbers[numbers.length - 1], 10);
      const lastDigit = number % 10;
      const lastTwoDigits = number % 100;

      let suffix;
      if (lastDigit === 1 && lastTwoDigits !== 11) {
        suffix = "день";
      } else if ([2, 3, 4].includes(lastDigit) && ![12, 13, 14].includes(lastTwoDigits)) {
        suffix = "дня";
      } else {
        suffix = "дней";
      }

      return cell.replace(/\s*(день|дня|дней)?$/i, "") + " " + suffix;
    }

    function getTodayDate() {
      const today = new Date();
      const day = String(today.getDate()).padStart(2, '0');
      const month = String(today.getMonth() + 1).padStart(2, '0');
      const year = today.getFullYear();
      return `${day}.${month}.${year}`;
    }

    // карта функций по индексам
    const cellHandlers = {
      3: handleCode,      // Номер запроса
      7: handleCompany,   // Заказчик (клиент)
      8: handleFrom,      // Место загрузки
      9: handleSvh,       // Место выгрузки (СВХ)
      10: handleDeliver,  // Довоз
      19: handlePrice,    // Ставка
      21: handleTransit   // Транзитные сроки
      // 23: handleCargoData // Данные груза 
    };

    function transform() {
      const raw = document.getElementById('row').value;
      if (!raw.trim()) {
        document.getElementById('out').textContent = 'Введите строку из таблицы.';
        return;
      }

      const parts = parseRow(raw);
      let collected = { code: '', price: '', svh: '', transit: '' };

      parts.forEach((cell, idx) => {
        if (cellHandlers[idx]) {
          const res = cellHandlers[idx](cell);
          if (idx === 3) collected.requestNumber = res;
          if (idx === 7) collected.company = res; // временно не использую.
          if (idx === 8) collected.from = res;
          if (idx === 9) collected.svh = res;
          if (idx === 10) collected.delivery = res;
          if (idx === 19) collected.price = res;
          if (idx === 21) collected.transit = res;
        }
      });

      const lines = [];
      // if (collected.requestNumber) lines.push(`${collected.requestNumber} (${collected.company})`); // пока на паузе
      if (collected.requestNumber) lines.push(`║ ${collected.requestNumber} ║`);
      if (document.getElementById('check-adr9').checked) {
        if (collected.price || collected.svh || collected.transit) {
          const destText = collected.svh ? `до ${collected.svh}` : '';
          lines.push(`${collected.price ? collected.price + ' USD' : ''} ${destText} если упаковка груза имеет знаки, обозначающие что груз опасный, в таком случае необходим ADR автомобиль по Китаю.`);
          lines.push(`__ USD ${destText} если упаковка груза не имеет знаков, обозначающих что груз опасный, в таком случае китайский своз можем сделать в обычном авто.`);
          // const transitText = collected.transit ? ` Транзитные сроки ${collected.transit}.` : '';
          // lines.push(`*${transitText}`);
        }
      } else if (document.getElementById('check-stackable-alt').checked) {
        const destTextOne = collected.svh ? `до ${collected.svh} (груз считался как штабелируемый)` : '';
        const destTextTwo = collected.svh ? `до ${collected.svh} (груз считался как не штабелируемый)` : '';
        lines.push(`${collected.price ? collected.price + ' USD' : ''} ${destTextOne}.`);
        lines.push(`__ USD ${destTextTwo}.`);
        // const transitText = collected.transit ? ` Транзитные сроки ${collected.transit}.` : '';
        // lines.push(`*${transitText}`);
      } else {
        if (collected.price || collected.svh || collected.transit) {
          const delivery = document.getElementById('check-delivery').checked || document.getElementById('check-delivery-another').checked ? " + довоз" : "";
          const fromText = collected.from ? `из ${collected.from}` : '';
          const destText = collected.svh ? `до ${collected.svh}${delivery}` : '';
          // const transitText = collected.transit ? ` Транзитные сроки ${collected.transit}.` : '';
          // lines.push(`${collected.price ? collected.price + ' USD нетто' : ''} ${fromText} ${destText}.${transitText}`);
          lines.push(`${collected.price ? collected.price + ' USD нетто' : ''} ${fromText} ${destText}.`);
        }
      }
      lines.push(` Транзитные сроки ${collected.transit}. Информируем вас, что из-за текущей ситуации на топливном рынке России возможны задержки в доставке грузов.`)
      if (document.getElementById('check-dimensions').checked) { lines.push("* Ставка ориентировочная, так как нет точных размеров груза. Когда появятся размеры, ставка будет пересчитана."); }
      if (document.getElementById('check-brand').checked) {
        lines.push("* + 20 000 CNY к базовой ставке за оформление экспортной лицензии (с возмещением НДС для отправителя).");
        lines.push("* + 3 000 CNY к базовой ставке за оформление без закрытия экспортной декларации (без возврата НДС для отправителя).");
      }
      if (document.getElementById('check-adr').checked) { lines.push("* В ставку включёна стоимость автомобиля для перевозки опасных грузов (ADR)."); }
      if (document.getElementById('check-temperature').checked) { lines.push("* Автомобиль с температурным режимом и хранение на температурном складе включены в ставку."); }
      if (document.getElementById('check-navigation').checked) { lines.push("* Стоимость навигационной пломбы включена в ставку."); }
      if (document.getElementById('check-stackable').checked) { lines.push("* Груз считался как штабелируемый."); }
      if (document.getElementById('check-non-stackable').checked) { lines.push("* Груз считался как не штабелируемый."); }
      if (document.getElementById('check-MZL').checked) { lines.push("* Ставка действительна при условии доставки груза на склад нашего агента. Если необходим своз нашими силами, стоимость будет пересмотрена."); }
      if (document.getElementById('check-delivery').checked) { lines.push(`* Стоимость довоза до ${collected.delivery} нашим автомобилем включена в ставку.`); }
      if (document.getElementById('check-delivery-another').checked) { lines.push(`* Стоимость довоза до ${collected.delivery} отдельным автомобилем включена в ставку.`); }


      const selectedRadio = document.querySelector('input[name="relevance"]:checked');
      if (selectedRadio) {
        const today = getTodayDate();
        switch (selectedRadio.id) {
          case 'one-day-relevance': lines.push(`* Ставка действительна в день просчёта (${today}).`); break;
          case 'three-day-relevance': lines.push(`* Ставка действительна в течение 3х дней (с ${today}).`); break;
          case 'five-day-relevance': lines.push(`* Ставка действительна в течение 5и дней (с ${today}).`); break;
          case 'seven-day-relevance': lines.push(`* Ставка действительна в течение 7и дней (с ${today}).`); break;
        }
      }
      if (document.getElementById('check-EPI').checked) { lines.push(`* Если груз стоит дороже 50000 USD, мы компенсируем 50 USD за ЭПИ, а всё, что сверху по квитанции, выставляем на оплату клиенту.`); }
      document.getElementById('out').textContent = lines.join('\n');
    }

    function resetAll() {
      document.getElementById('row').value = '';
      document.getElementById('check-MZL').checked = false;
      document.getElementById('check-adr').checked = false;
      document.getElementById('check-adr9').checked = false;
      document.getElementById('check-brand').checked = false;
      document.getElementById('check-delivery').checked = false;
      document.getElementById('check-stackable').checked = false;
      document.getElementById('check-dimensions').checked = false;
      document.getElementById('check-navigation').checked = false;
      document.getElementById('check-temperature').checked = false;
      document.getElementById('check-stackable-alt').checked = false;
      document.getElementById('check-non-stackable').checked = false;
      document.getElementById('check-delivery-another').checked = false;
      document.getElementById('row').focus();
      document.getElementById('out').textContent = 'Здесь появится текст.';
    }

    function showToast(message, isError = false) {
      const toast = document.getElementById("toast");
      toast.textContent = message;
      toast.className = "toast" + (isError ? " error" : "");
      toast.classList.add("show");

      setTimeout(() => {
        toast.classList.remove("show");
      }, 1200);
    }

    async function copyOut() {
      const text = document.getElementById('out').textContent;
      try {
        await navigator.clipboard.writeText(text);
        showToast("Скопировано!");
      } catch {
        showToast("Не удалось скопировать!", true);
      }
    }

  </script>
</body>

</html>
